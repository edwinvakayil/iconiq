name: Gemini AI Assistant
on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]

jobs:
  gemini-process:
    # Only run if it's a new issue OR if Gemini is tagged in a comment
    if: |
      github.event_name == 'issues' || 
      github.event_name == 'pull_request' ||
      contains(github.event.comment.body, '@gemini')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gemini Task Handler
        # Using the official action with the latest verified versioning
        uses: google-github-actions/run-gemini-cli@main
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          # We pass the instruction via the 'command' or 'prompt' input
          prompt: |
            You are an automated assistant. 
            User Request: "${{ github.event.comment.body || 'New Issue/PR Opened' }}"
            
            1. If this is a new Issue/PR: Provide a high-level summary and sanity check.
            2. If tagged "@gemini review": Analyze the diff and suggest improvements.
            3. If tagged "@gemini fix": Provide the code fix directly in a code block.