name: Gemini AI Assistant
on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]
  pull_request_review_comment:
    types: [created]

jobs:
  gemini-process:
    # Logic: Run on new issues/PRs OR if explicitly tagged @gemini
    if: |
      github.event.action == 'opened' || 
      (github.event.comment && contains(github.event.comment.body, '@gemini'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Fetches enough history for a diff

      - name: Gemini Task Handler
        uses: google-github-actions/run-gemini-cli@main
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          # Use -latest suffix; bare "gemini-1.5-flash" is not a valid model ID for generateContent
          gemini_model: "gemini-1.5-flash-latest"
          prompt: |
            You are a Senior Developer. 
            
            Task:
            1. If NEW ISSUE/PR: Summarize the goal in 2 sentences.
            2. If "@gemini review": Review the code diff for bugs/security.
            3. If "@gemini fix": Provide a code snippet to solve the issue.

            Context:
            - Event: ${{ github.event_name }}
            - Title: ${{ github.event.issue.title || github.event.pull_request.title }}
            - Content: ${{ github.event.comment.body || github.event.issue.body || github.event.pull_request.body }}

            Format your response clearly using Markdown.