name: Gemini AI Assistant
on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]
  pull_request_review_comment:
    types: [created]

jobs:
  gemini-process:
    if: |
      github.event.action == 'opened' || 
      (github.event.comment && contains(github.event.comment.body, '@gemini'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Gemini Task Handler
        uses: google-github-actions/run-gemini-cli@main
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          # gemini_model is the correct input name for this action
          gemini_model: "gemini-2.5-flash" 
          prompt: |
            You are a Senior Developer. 
            
            Current Event: ${{ github.event_name }}
            Title: ${{ github.event.issue.title || github.event.pull_request.title }}
            User Input: "${{ github.event.comment.body || github.event.issue.body || github.event.pull_request.body }}"

            Instructions:
            - If NEW ISSUE/PR: Summarize the goal and check for technical clarity.
            - If "@gemini review": Perform a code review on the diff.
            - If "@gemini fix": Provide a code snippet solution.