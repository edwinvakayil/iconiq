name: Gemini AI Assistant
on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]
  pull_request_review_comment:
    types: [created]

jobs:
  gemini-process:
    # This condition ensures it runs on new items OR when tagged
    if: |
      github.event.action == 'opened' || 
      contains(github.event.comment.body, '@gemini')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gemini Task Handler
        uses: google-github-actions/run-gemini-cli@main
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            You are a Senior Software Engineer assistant.
            
            Context:
            - Event: ${{ github.event_name }}
            - User Command: "${{ github.event.comment.body }}"
            - Issue/PR Title: "${{ github.event.issue.title || github.event.pull_request.title }}"
            - Body Content: "${{ github.event.issue.body || github.event.pull_request.body }}"

            Instructions:
            1. If this is a NEW ISSUE/PR (no comment tag): Provide a 3-bullet point summary and check for missing information.
            2. If tagged "@gemini review": Review the code changes in the PR and suggest improvements for performance and security.
            3. If tagged "@gemini fix": Provide a clear code block with the solution to the described problem.
            
            Always be concise and professional. 